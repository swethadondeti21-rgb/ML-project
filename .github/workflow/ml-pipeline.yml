# .github/workflows/ml-pipeline.yml
# =============================================================================
# CI/CD Pipeline for the Fraud Detection ML Model
# =============================================================================
name: ML CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

jobs:

  # ── STAGE 1: Data Quality Tests ─────────────────────────────────────────────
  test-data:
    name: "Stage 1 — Test Data Quality"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Generate training and test data
        run: python src/generate_data.py

      - name: Run data quality tests
        run: pytest tests/test_data.py -v --tb=short

  # ── STAGE 2: Train & Validate Model ─────────────────────────────────────────
  train-and-validate:
    name: "Stage 2 — Train & Validate Model"
    runs-on: ubuntu-latest
    needs: test-data

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: Generate training and test data
        run: python src/generate_data.py

      - name: Train the fraud detection model
        run: python src/train.py

      - name: Run model performance tests
        run: pytest tests/test_model.py -v --tb=short

      - name: Upload trained model artifact
        uses: actions/upload-artifact@v4
        with:
          name: fraud-detection-model-${{ github.sha }}
          path: models/model.pkl
          retention-days: 30

  # ── STAGE 3: Build Docker Image & Smoke Test ────────────────────────────────
  build-and-deploy:
    name: "Stage 3 — Build & Smoke Test"
    runs-on: ubuntu-latest
    needs: train-and-validate
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download trained model artifact
        uses: actions/download-artifact@v4
        with:
          name: fraud-detection-model-${{ github.sha }}
          path: models/  # Restores the file to models/model.pkl

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for testing
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true # Loads the image into the local Docker daemon for the smoke test
          tags: fraud-detection-api:${{ github.sha }}

      - name: Run container smoke test
        run: |
          docker run --detach \
            --publish 8000:8000 \
            --name smoke-test-api \
            fraud-detection-api:${{ github.sha }}

          echo "Waiting for API to start..."
          sleep 8

          echo "Testing /health endpoint..."
          curl --fail --silent --show-error http://localhost:8000/health

          echo "Testing /predict endpoint..."
          curl --fail --silent --show-error \
            --request POST http://localhost:8000/predict \
            --header "Content-Type: application/json" \
            --data '{"amount": 50.0, "hour": 14, "day_of_week": 2, "merchant_category": "grocery"}'

          docker stop smoke-test-api

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/fraud-detection-api:latest
            ${{ secrets.DOCKER_USERNAME }}/fraud-detection-api:${{ github.sha }}
  
      - name: Print deployment summary
        run: |
          echo "=============================================="
          echo "Deployment successful!"
          echo "Commit SHA : ${{ github.sha }}"
          echo "Branch     : ${{ github.ref_name }}"
          echo "Triggered  : ${{ github.event_name }}"
          echo "=============================================="